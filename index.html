<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Underproject QR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Estilos de scroll personalizado */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }

        /* Corrección visual para el QR en Computadora */
        .qr-canvas {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        
        /* Asegura que la imagen no se desborde del cuadro blanco */
        .qr-canvas img, .qr-canvas canvas { 
            display: block !important;
            max-width: 100%;
            height: auto !important;
            image-rendering: pixelated;
        }

        .oculto { display: none !important; }
        
        /* Colores de los estados */
        .status-pendiente { color: #a1a1aa; border: 1px solid #3f3f46; background: rgba(63, 63, 70, 0.2); }
        .status-asistio { color: #4ade80; border: 1px solid #166534; background: rgba(22, 101, 52, 0.2); }
        .status-no-asistio { color: #f87171; border: 1px solid #991b1b; background: rgba(153, 27, 27, 0.2); }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full space-y-8">
        
        <div class="text-center py-4">
            <h1 class="text-xl font-bold tracking-tight text-zinc-200 uppercase">
                Creacion de Codigos QR Underproject
            </h1>
            <div class="h-1 w-20 bg-indigo-600 mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="form-container" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl">
            <label class="block text-[10px] uppercase tracking-widest text-zinc-500 mb-2 font-bold">Nombre del Asistente</label>
            <input type="text" id="userName" placeholder="Escribir nombre aquí..." 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-indigo-600 transition-all text-lg mb-4 text-white">
            
            <button id="btnGenerate" onclick="processRegistration()" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 font-black py-4 rounded-xl transition-all uppercase text-sm tracking-widest">
                Generar y Guardar en Excel
            </button>
        </div>

        <div id="ticket-display" class="oculto bg-zinc-900 p-6 rounded-3xl border-2 border-indigo-600 text-center">
            <h2 id="ticket-title" class="text-lg font-black text-white mb-4 uppercase truncate px-2"></h2>
            
            <div class="flex justify-center mb-6">
                <div id="qrcode" class="qr-canvas"></div>
            </div>
            
            <div class="bg-zinc-950 border border-zinc-800 rounded-lg py-2 mb-6 mx-4">
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">ID Personal</p>
                <p id="ticket-token" class="text-indigo-400 font-mono font-bold text-sm tracking-widest"></p>
            </div>

            <div class="space-y-3 px-4">
                <button onclick="downloadQR()" class="w-full bg-white text-black font-black py-3 rounded-xl hover:bg-zinc-200 transition-all uppercase text-xs tracking-widest">
                    ⬇️ Descargar PNG
                </button>
                <button onclick="resetApp()" class="w-full bg-zinc-800 text-zinc-400 font-bold py-3 rounded-xl transition-all uppercase text-xs tracking-widest border border-zinc-700">
                    Siguiente Registro ➔
                </button>
            </div>
        </div>

        <div id="history-container" class="space-y-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3 border-b border-zinc-800 pb-2">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Panel Global (Excel)</h2>
                    <button onclick="fetchCloudData()" class="text-[9px] text-indigo-500 hover:text-indigo-300 font-bold uppercase">Sincronizar 🔄</button>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Asistió</p>
                        <p id="count-asistio" class="text-green-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Faltó</p>
                        <p id="count-no-asistio" class="text-red-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Total</p>
                        <p id="count-total" class="text-indigo-500 font-black text-lg">0</p>
                    </div>
                </div>
            </div>

            <input type="text" id="searchInput" onkeyup="renderHistory()" placeholder="🔍 Buscar en la lista..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500 text-white">

            <div id="history-list" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scroll"></div>
            
            <button onclick="clearFullHistory()" class="w-full text-[10px] text-zinc-600 hover:text-red-500 font-bold uppercase tracking-widest pt-4">Limpiar vista local</button>
        </div>
    </div>

    <script>
        // URL DE TU GOOGLE APPS SCRIPT ASIGNADA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQr0nz2JAXuWcc1mfJQe46drbpcTeIzVJLbUn5H8Mo97r1435aC7rhnGPG3IoiDqt6xA/exec"; 
        
        let sessionHistory = [];
        let currentName = ""; 

        window.onload = function() {
            const savedData = localStorage.getItem('underproject_db');
            if (savedData) {
                sessionHistory = JSON.parse(savedData);
                renderHistory();
            }
            fetchCloudData(); // Intenta traer los datos del Excel al cargar
        };

        // Función para leer datos del Excel
        async function fetchCloudData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const cloudData = await response.json();
                if (cloudData && cloudData.length > 0) {
                    sessionHistory = cloudData.reverse().map(item => ({
                        ...item,
                        status: item.status || 'pendiente'
                    }));
                    localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
                    renderHistory();
                }
            } catch(e) { console.log("Nota: No se pudo conectar con el Excel para leer datos."); }
        }

        // Función para registrar y guardar
        async function processRegistration() {
            const input = document.getElementById('userName');
            const btn = document.getElementById('btnGenerate');
            const name = input.value.trim();
            
            if (!name) return alert("Escribe un nombre.");

            btn.innerText = "GUARDANDO EN EXCEL...";
            btn.disabled = true;

            const token = 'UP-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const newGuest = { 
                name, 
                token, 
                data: `UP:${token}|${name}`, 
                status: 'pendiente' 
            };

            // Mostrar el QR al usuario de inmediato
            showTicket(name, newGuest.data, token);

            // ENVIAR AL EXCEL (POST)
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(newGuest)
                });
                
                // Actualizar historial local
                sessionHistory.unshift(newGuest);
                localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
                renderHistory();
            } catch(e) { 
                console.error("Error al enviar datos al script.");
                alert("Error al guardar en la nube, pero el código se generó.");
            }

            btn.innerText = "Generar y Guardar en Excel";
            btn.disabled = false;
            input.value = "";
        }

        function showTicket(name, data, token) {
            currentName = name; 
            document.getElementById('form-container').classList.add('oculto');
            document.getElementById('history-container').classList.add('oculto');
            document.getElementById('ticket-display').classList.remove('oculto');
            
            document.getElementById('ticket-title').innerText = name;
            document.getElementById('ticket-token').innerText = token;
            
            const container = document.getElementById('qrcode');
            container.innerHTML = ""; 

            // Generar el código QR
            setTimeout(() => {
                new QRCode(container, {
                    text: data,
                    width: 250,
                    height: 250,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }, 100);
        }

        // Cambiar estado y avisar al Excel
        async function toggleStatus(event, index) {
            event.stopPropagation();
            const item = sessionHistory[index];
            
            if (item.status === 'pendiente') item.status = 'asistio';
            else if (item.status === 'asistio') item.status = 'no-asistio';
            else item.status = 'pendiente';

            renderHistory();
            localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ token: item.token, status: item.status })
                });
            } catch(e) { }
        }

        function renderHistory() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            let asis = 0, noAsis = 0;
            
            sessionHistory.forEach((item, index) => {
                if (item.status === 'asistio') asis++;
                if (item.status === 'no-asistio') noAsis++;

                if (item.name.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-800 p-3 rounded-2xl flex justify-between items-center hover:border-indigo-500 cursor-pointer transition-all active:scale-95";
                    div.onclick = () => showTicket(item.name, item.data || `UP:${item.token}|${item.name}`, item.token);
                    
                    let label = item.status === 'asistio' ? 'Asistió' : (item.status === 'no-asistio' ? 'Faltó' : 'Pendiente');
                    
                    div.innerHTML = `
                        <div class="flex-1">
                            <p class="font-bold text-sm text-zinc-200">${item.name}</p>
                            <p class="text-[9px] text-zinc-500 font-mono">${item.token}</p>
                        </div>
                        <button onclick="toggleStatus(event, ${index})" class="text-[8px] font-bold py-1 px-3 rounded-full transition-all uppercase ${'status-'+item.status}">${label}</button>
                    `;
                    list.appendChild(div);
                }
            });
            document.getElementById('count-asistio').innerText = asis;
            document.getElementById('count-no-asistio').innerText = noAsis;
            document.getElementById('count-total').innerText = sessionHistory.length;
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const hoy = new Date();
                const fecha = `${String(hoy.getDate()).padStart(2, '0')}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${hoy.getFullYear()}`;
                const nombreLimpio = currentName.replace(/[^a-z0-9]/gi, '_');
                
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `${nombreLimpio}_QR_${fecha}.png`;
                a.click();
            }
        }

        function resetApp() {
            document.getElementById('ticket-display').classList.add('oculto');
            document.getElementById('form-container').classList.remove('oculto');
            document.getElementById('history-container').classList.remove('oculto');
            fetchCloudData();
        }

        function clearFullHistory() {
            if (confirm("¿Limpiar la lista local? No borrará nada de tu Excel.")) {
                localStorage.clear();
                sessionHistory = [];
                renderHistory();
            }
        }
    </script>
</body>
</html>
