<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Underproject QR Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .glow-effect {
            position: absolute;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, transparent 70%);
            filter: blur(30px); z-index: -1;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        .logo-container {
            background: linear-gradient(145deg, #18181b, #09090b);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(79, 70, 229, 0.2);
        }

        /* QR RESPONSIVO: Máximo 250px en PC para que no se vea gigante */
        .qr-canvas {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 220px;
            max-width: 250px; /* Limita el tamaño en pantallas grandes */
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            padding: 15px;
        }
        
        .qr-canvas img, .qr-canvas canvas { 
            max-width: 100% !important;
            height: auto !important;
            margin: 0 auto !important; 
            display: block !important;
        }

        .oculto { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        
        .status-pendiente { color: #a1a1aa; border: 1px solid #3f3f46; background: rgba(63, 63, 70, 0.2); }
        .status-asistio { color: #4ade80; border: 1px solid #166534; background: rgba(22, 101, 52, 0.2); }
        .status-no-asistio { color: #f87171; border: 1px solid #991b1b; background: rgba(153, 27, 27, 0.2); }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col items-center p-4">

    <div class="max-w-md w-full space-y-6">
        
        <div class="relative flex flex-col items-center py-6">
            <div class="glow-effect"></div>
            <div class="logo-container w-20 h-20 rounded-2xl flex items-center justify-center mb-4 relative overflow-hidden">
                <div class="grid grid-cols-2 gap-1 w-10 h-10">
                    <div class="border-2 border-indigo-500 rounded-sm"></div>
                    <div class="bg-indigo-500 rounded-sm"></div>
                    <div class="bg-indigo-500 rounded-sm"></div>
                    <div class="border-2 border-indigo-500 rounded-sm flex items-center justify-center">
                        <div class="w-1 h-1 bg-indigo-500"></div>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">
                    Under<span class="text-indigo-500">Project</span>
                </h1>
                <p class="text-[9px] text-zinc-500 uppercase tracking-[0.4em] font-bold mt-1">QR Generation System</p>
            </div>
        </div>

        <div id="form-container" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl">
            <label class="block text-[10px] uppercase tracking-widest text-zinc-500 mb-2 font-bold">Nombre del Asistente</label>
            <input type="text" id="userName" placeholder="Escribe el nombre aquí..." 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-indigo-600 transition-all text-lg mb-4 text-white">
            
            <button id="btnGenerate" onclick="processRegistration()" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 font-black py-4 rounded-xl transition-all uppercase text-sm tracking-widest">
                Generar y Registrar
            </button>
        </div>

        <div id="ticket-display" class="oculto bg-zinc-900 p-6 rounded-3xl border-2 border-indigo-600 text-center">
            <h2 id="ticket-title" class="text-lg font-black text-white mb-2 uppercase truncate px-2"></h2>
            
            <div id="qrcode" class="qr-canvas shadow-xl mb-4"></div>
            
            <div class="bg-zinc-950 border border-zinc-800 rounded-lg py-2 mb-4 mx-4">
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Identificador Único</p>
                <p id="ticket-token" class="text-indigo-400 font-mono font-bold text-sm tracking-widest"></p>
            </div>
            <div class="space-y-3 px-4">
                <button onclick="downloadQR()" class="w-full bg-white text-black font-black py-3 rounded-xl hover:bg-zinc-200 transition-all uppercase text-xs tracking-widest">
                    ⬇️ Descargar PNG
                </button>
                <button onclick="resetApp()" class="w-full bg-zinc-800 text-zinc-400 font-bold py-3 rounded-xl transition-all uppercase text-xs tracking-widest border border-zinc-700">
                    Siguiente Persona ➔
                </button>
            </div>
        </div>

        <div id="history-container" class="space-y-4 pt-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3 border-b border-zinc-800 pb-2">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Panel de Control Global</h2>
                    <button onclick="fetchCloudData()" class="text-[9px] text-indigo-500 hover:text-indigo-300 font-bold uppercase">Sincronizar 🔄</button>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Asistió</p>
                        <p id="count-asistio" class="text-green-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Faltó</p>
                        <p id="count-no-asistio" class="text-red-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Total</p>
                        <p id="count-total" class="text-indigo-500 font-black text-lg">0</p>
                    </div>
                </div>
            </div>
            
            <input type="text" id="searchInput" onkeyup="renderHistory()" placeholder="🔍 Buscar asistente..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500 text-white">

            <div id="history-list" class="space-y-2 max-h-80 overflow-y-auto pr-2 custom-scroll"></div>
            
            <button onclick="clearFullHistory()" class="w-full text-[10px] text-zinc-600 hover:text-red-500 font-bold uppercase tracking-widest pt-4">Borrar Caché Local</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8fsYmrOg52gJ43V1Vh-77cSLRE4daTTJrqCqWM5bbGkC6mxadJrk2ztRYSaSPWEua/exec"; 
        
        let sessionHistory = [];
        let currentName = ""; 

        window.onload = function() {
            const savedData = localStorage.getItem('underproject_db');
            if (savedData) {
                sessionHistory = JSON.parse(savedData);
                renderHistory();
            }
            fetchCloudData();
        };

        async function fetchCloudData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const cloudData = await response.json();
                if (cloudData && cloudData.length > 0) {
                    // Reemplazamos el historial con lo que hay en Google Sheets
                    sessionHistory = cloudData.reverse(); 
                    localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
                    renderHistory();
                }
            } catch(e) { console.log("Error de conexión a la nube."); }
        }

        async function processRegistration() {
            const input = document.getElementById('userName');
            const btn = document.getElementById('btnGenerate');
            const name = input.value.trim();
            if (!name) return alert("Escribe un nombre.");

            btn.innerText = "REGISTRANDO...";
            btn.disabled = true;

            const token = 'UP-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            const newGuest = { 
                name, 
                token, 
                data: `UNDERPROJECT | ${name} | ID: ${token}`, 
                entryNumber: sessionHistory.length + 1, 
                status: 'pendiente' 
            };

            // Mostrar primero para velocidad
            sessionHistory.unshift(newGuest);
            renderHistory();
            showTicket(name, newGuest.data, token);

            // Enviar a Google Sheets
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(newGuest)
                });
            } catch(e) { console.error("Error nube"); }

            btn.innerText = "GENERAR Y REGISTRAR";
            btn.disabled = false;
            input.value = "";
        }

        function showTicket(name, data, token) {
            currentName = name; 
            document.getElementById('form-container').classList.add('oculto');
            document.getElementById('history-container').classList.add('oculto');
            
            const ticketDisplay = document.getElementById('ticket-display');
            ticketDisplay.classList.remove('oculto');
            
            document.getElementById('ticket-title').innerText = name;
            document.getElementById('ticket-token').innerText = token;
            
            const container = document.getElementById('qrcode');
            container.innerHTML = ""; 

            setTimeout(() => {
                new QRCode(container, {
                    text: data,
                    width: 256,
                    height: 256,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }, 100);
        }

        async function toggleStatus(event, index) {
            event.stopPropagation();
            const item = sessionHistory[index];
            
            if (item.status === 'pendiente') item.status = 'asistio';
            else if (item.status === 'asistio') item.status = 'no-asistio';
            else item.status = 'pendiente';

            renderHistory();

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ token: item.token, status: item.status })
                });
            } catch(e) { }
        }

        function resetApp() {
            document.getElementById('ticket-display').classList.add('oculto');
            document.getElementById('form-container').classList.remove('oculto');
            document.getElementById('history-container').classList.remove('oculto');
            fetchCloudData(); // Al cerrar un ticket, actualiza la lista por si alguien más registró
        }

        function renderHistory() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            let asis = 0, noAsis = 0;
            
            sessionHistory.forEach((item, index) => {
                if (item.status === 'asistio') asis++;
                if (item.status === 'no-asistio') noAsis++;

                if (item.name.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-800 p-3 rounded-2xl flex justify-between items-center hover:border-indigo-500 cursor-pointer transition-all";
                    div.onclick = () => showTicket(item.name, item.data, item.token);
                    
                    let label = item.status === 'asistio' ? 'Asistió' : (item.status === 'no-asistio' ? 'Faltó' : 'Pendiente');
                    
                    div.innerHTML = `
                        <div class="flex-1">
                            <p class="font-bold text-sm text-zinc-200">${item.name}</p>
                            <p class="text-[9px] text-zinc-500 font-mono">${item.token}</p>
                        </div>
                        <button onclick="toggleStatus(event, ${index})" class="text-[8px] font-bold py-1 px-3 rounded-full transition-all uppercase ${'status-'+item.status}">${label}</button>
                    `;
                    list.appendChild(div);
                }
            });
            document.getElementById('count-asistio').innerText = asis;
            document.getElementById('count-no-asistio').innerText = noAsis;
            document.getElementById('count-total').innerText = sessionHistory.length;
        }

        function clearFullHistory() {
            if (confirm("¿Borrar historial local? (No afectará a Google Sheets)")) {
                localStorage.clear();
                sessionHistory = [];
                renderHistory();
            }
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `QR_${currentName}.png`;
                a.click();
            }
        }
    </script>
</body>
</html>
