<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Underproject QR & Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }

        #qrcode {
            background-color: white;
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 220px; 
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            box-sizing: border-box;
        }
        
        #qrcode img, #qrcode canvas { 
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            display: block !important;
            image-rendering: pixelated;
        }

        .oculto { display: none !important; }
        
        .status-pendiente { color: #a1a1aa; border: 1px solid #3f3f46; background: rgba(63, 63, 70, 0.2); }
        .status-asistio { color: #4ade80; border: 1px solid #166534; background: rgba(22, 101, 52, 0.2); }
        .status-no-asistio { color: #f87171; border: 1px solid #991b1b; background: rgba(153, 27, 27, 0.2); }
        
        #reader video { border-radius: 0.75rem; object-fit: cover; width: 100%; }

        /* Efecto de flash verde cuando detecta el código */
        .flash-success {
            border-color: #4ade80 !important;
            box-shadow: 0 0 25px 5px rgba(74, 222, 128, 0.6) !important;
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-black text-white font-sans min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full space-y-8">
        
        <div class="text-center py-4">
            <h1 class="text-xl font-bold tracking-tight text-zinc-200 uppercase">
                Underproject Acceso
            </h1>
            <div class="h-1 w-20 bg-indigo-600 mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="form-container" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl">
            <label class="block text-[10px] uppercase tracking-widest text-zinc-500 mb-2 font-bold">Nombre del Asistente</label>
            <input type="text" id="userName" placeholder="Escribir nombre aquí..." 
            class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-4 outline-none focus:ring-2 focus:ring-indigo-600 transition-all text-lg mb-4 text-white">
            
            <button id="btnGenerate" onclick="processRegistration()" class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 font-black py-4 rounded-xl transition-all uppercase text-sm tracking-widest mb-3">
                Generar y Guardar
            </button>

            <button onclick="startScanner()" class="w-full bg-zinc-800 text-white border border-zinc-700 hover:bg-zinc-700 active:scale-95 font-black py-4 rounded-xl transition-all uppercase text-sm tracking-widest flex justify-center items-center gap-2">
                📷 Escanear Entrada
            </button>
        </div>

        <div id="scanner-container" class="oculto bg-zinc-900 p-6 rounded-3xl border-2 border-indigo-600 text-center shadow-2xl transition-all">
            <h2 class="text-lg font-black text-white mb-4 uppercase tracking-widest">Escáner de Acceso</h2>
            
            <div id="reader-wrapper" class="relative w-full mb-4 bg-black rounded-xl overflow-hidden border-4 border-zinc-800 min-h-[300px] transition-all">
                <div id="reader" class="w-full h-full relative z-0"></div>
            </div>

            <div class="mb-4">
                <input type="file" id="qr-input-file" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                <label for="qr-input-file" class="w-full flex justify-center items-center gap-2 bg-zinc-800 text-white border border-zinc-700 hover:bg-zinc-600 active:scale-95 font-bold py-4 rounded-xl transition-all uppercase text-xs tracking-widest cursor-pointer shadow-lg">
                    📁 Subir QR de Galería
                </label>
            </div>
            
            <button onclick="stopScanner()" class="w-full bg-red-600/20 text-red-500 border border-red-900 font-bold py-3 rounded-xl transition-all uppercase text-xs tracking-widest">
                Cancelar y Volver
            </button>
        </div>

        <div id="result-display" class="oculto bg-zinc-900 p-8 rounded-3xl border-4 text-center shadow-2xl flex flex-col items-center justify-center">
            <div id="result-icon" class="text-7xl mb-4"></div>
            <h2 id="result-title" class="text-2xl font-black mb-2 uppercase tracking-widest"></h2>
            <p id="result-message" class="text-lg text-zinc-300 font-bold mb-8"></p>
            
            <button onclick="startScanner()" class="w-full bg-indigo-600 hover:bg-indigo-500 font-black py-4 rounded-xl transition-all uppercase text-sm tracking-widest mb-3">
                📷 Escanear Otra
            </button>
            <button onclick="resetApp()" class="w-full bg-zinc-800 text-zinc-400 border border-zinc-700 font-bold py-4 rounded-xl transition-all uppercase text-xs tracking-widest">
                Volver al Inicio
            </button>
        </div>

        <div id="ticket-display" class="oculto bg-zinc-900 p-6 rounded-3xl border-2 border-indigo-600 text-center shadow-2xl">
            <h2 id="ticket-title" class="text-lg font-black text-white mb-4 uppercase truncate px-2"></h2>
            
            <div class="flex justify-center mb-6 w-full px-4">
                <div id="qrcode"></div>
            </div>
            
            <div class="bg-zinc-950 border border-zinc-800 rounded-lg py-2 mb-6 mx-4">
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">ID Personal</p>
                <p id="ticket-token" class="text-indigo-400 font-mono font-bold text-sm tracking-widest"></p>
            </div>

            <div class="space-y-3 px-4">
                <button onclick="downloadQR()" class="w-full bg-white text-black font-black py-3 rounded-xl hover:bg-zinc-200 transition-all uppercase text-xs tracking-widest">
                    ⬇️ Descargar PNG
                </button>
                <button onclick="resetApp()" class="w-full bg-zinc-800 text-zinc-400 font-bold py-3 rounded-xl transition-all uppercase text-xs tracking-widest border border-zinc-700">
                    Volver al Inicio ➔
                </button>
            </div>
        </div>

        <div id="history-container" class="space-y-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3 border-b border-zinc-800 pb-2">
                    <h2 class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Panel Global</h2>
                    <button onclick="fetchCloudData()" class="text-[9px] text-indigo-500 hover:text-indigo-300 font-bold uppercase">Sincronizar 🔄</button>
                </div>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Asistió</p>
                        <p id="count-asistio" class="text-green-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Faltó</p>
                        <p id="count-no-asistio" class="text-red-500 font-black text-lg">0</p>
                    </div>
                    <div class="bg-zinc-950 p-2 rounded-xl border border-zinc-800">
                        <p class="text-[8px] uppercase text-zinc-500 mb-1">Total</p>
                        <p id="count-total" class="text-indigo-500 font-black text-lg">0</p>
                    </div>
                </div>
            </div>

            <input type="text" id="searchInput" onkeyup="renderHistory()" placeholder="🔍 Buscar en la lista..." 
            class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500 text-white">

            <div id="history-list" class="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scroll"></div>
            
            <button onclick="clearFullHistory()" class="w-full text-[10px] text-zinc-600 hover:text-red-500 font-bold uppercase tracking-widest pt-4">Limpiar vista local</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQr0nz2JAXuWcc1mfJQe46drbpcTeIzVJLbUn5H8Mo97r1435aC7rhnGPG3IoiDqt6xA/exec"; 
        let sessionHistory = [];
        let currentName = ""; 
        let html5QrcodeScanner = null;

        window.onload = function() {
            const savedData = localStorage.getItem('underproject_db');
            if (savedData) { sessionHistory = JSON.parse(savedData); renderHistory(); }
            fetchCloudData();
        };

        async function fetchCloudData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const cloudData = await response.json();
                if (cloudData && cloudData.length > 0) {
                    sessionHistory = cloudData.reverse().map(item => ({ ...item, status: item.status || 'pendiente' }));
                    localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
                    renderHistory();
                }
            } catch(e) { console.log("Usando datos locales."); }
        }

        async function processRegistration() {
            const input = document.getElementById('userName');
            const btn = document.getElementById('btnGenerate');
            const name = input.value.trim();
            if (!name) return alert("Escribe un nombre.");

            btn.innerText = "GUARDANDO..."; btn.disabled = true;

            const token = 'UP-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            const newGuest = { name, token, data: `UP:${token}|${name}`, status: 'pendiente' };
            showTicket(name, newGuest.data, token);

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newGuest) });
                sessionHistory.unshift(newGuest);
                localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
                renderHistory();
            } catch(e) { alert("Guardado localmente. Error de red."); }

            btn.innerText = "Generar y Guardar"; btn.disabled = false; input.value = "";
        }

        function showTicket(name, data, token) {
            currentName = name; 
            document.getElementById('form-container').classList.add('oculto');
            document.getElementById('history-container').classList.add('oculto');
            document.getElementById('result-display').classList.add('oculto');
            document.getElementById('ticket-display').classList.remove('oculto');
            
            document.getElementById('ticket-title').innerText = name;
            document.getElementById('ticket-token').innerText = token;
            
            const container = document.getElementById('qrcode');
            container.innerHTML = ""; 
            setTimeout(() => {
                new QRCode(container, { text: data, width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
            }, 100);
        }

        // --- MANEJADOR DE LA PANTALLA DE RESULTADOS ---
        function showResult(title, message, type) {
            document.getElementById('form-container').classList.add('oculto');
            document.getElementById('history-container').classList.add('oculto');
            document.getElementById('scanner-container').classList.add('oculto');
            document.getElementById('ticket-display').classList.add('oculto');
            
            const resultDisplay = document.getElementById('result-display');
            const iconEl = document.getElementById('result-icon');
            const titleEl = document.getElementById('result-title');
            const messageEl = document.getElementById('result-message');
            
            resultDisplay.classList.remove('oculto');
            resultDisplay.className = "bg-zinc-900 p-8 rounded-3xl border-4 text-center shadow-2xl flex flex-col items-center justify-center w-full";
            titleEl.className = "text-2xl font-black mb-2 uppercase tracking-widest";
            
            // whitespace-pre-line permite que los "Enters" (\n) se vean en pantalla
            messageEl.className = "text-sm md:text-lg text-zinc-300 font-bold mb-8 whitespace-pre-line text-left bg-black/30 p-4 rounded-xl w-full border border-zinc-800 break-words";
            
            titleEl.innerText = title; 
            messageEl.innerText = message;
            
            if (type === 'green') {
                resultDisplay.classList.add('border-green-500'); titleEl.classList.add('text-green-500'); iconEl.innerText = "✅";
            } else if (type === 'red') {
                resultDisplay.classList.add('border-red-500'); titleEl.classList.add('text-red-500'); iconEl.innerText = "❌";
            } else {
                resultDisplay.classList.add('border-yellow-500'); titleEl.classList.add('text-yellow-500'); iconEl.innerText = "⚠️";
            }
        }

        // --- LÓGICA UNIFICADA DE VALIDACIÓN ---
        async function processScannedQR(decodedText) {
            // Apagar cámara si estaba prendida
            if (html5QrcodeScanner && html5QrcodeScanner.isScanning) {
                try { await html5QrcodeScanner.stop(); html5QrcodeScanner.clear(); } catch(e) {}
            }

            const match = decodedText.match(/UP:(UP-[A-Z0-9]+)\|/);
            
            if (!match) { 
                showResult("No Válido", "QR externo. No pertenece a este evento.", "red"); 
                return; 
            }

            const tokenScaneado = match[1];
            const guestIndex = sessionHistory.findIndex(g => g.token === tokenScaneado);

            if (guestIndex === -1) { 
                showResult("No Encontrado", "QR no encontrado en el historial.", "red"); 
                return; 
            }

            const guest = sessionHistory[guestIndex];

            if (guest.status === 'asistio') { 
                showResult("Ya Escaneado", `¡Cuidado!\nEl QR de ${guest.name} ya fue usado anteriormente.`, "yellow"); 
                return; 
            }

            guest.status = 'asistio';
            localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
            renderHistory();

            // Formatear datos para la pantalla de éxito
            const hoy = new Date();
            const fechaHora = hoy.toLocaleDateString('es-ES') + " a las " + hoy.toLocaleTimeString('es-ES', {hour: '2-digit', minute:'2-digit'});
            
            const detalles = `👤 Nombre: ${guest.name}\n🎟️ ID Tarjeta: ${guest.token}\n📅 Escaneado el: ${fechaHora}\n\n✅ ACCESO CONFIRMADO`;
            
            showResult("Verificado", detalles, "green");

            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ token: guest.token, status: 'asistio' }) }); } catch(e) {}
        }

        function startScanner() {
            document.getElementById('form-container').classList.add('oculto');
            document.getElementById('history-container').classList.add('oculto');
            document.getElementById('result-display').classList.add('oculto');
            document.getElementById('scanner-container').classList.remove('oculto');
            
            document.getElementById('reader-wrapper').classList.remove('flash-success');

            html5QrcodeScanner = new Html5Qrcode("reader");
            
            const config = { fps: 15, qrbox: { width: 250, height: 250 } }; 
            
            html5QrcodeScanner.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => { alert("Error al acceder a la cámara. Revisa los permisos."); stopScanner(); });
        }

        function stopScanner() {
            document.getElementById('scanner-container').classList.add('oculto');
            document.getElementById('form-container').classList.remove('oculto');
            document.getElementById('history-container').classList.remove('oculto');
            if (html5QrcodeScanner) {
                try { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner.clear(); }).catch(e => {}); } catch(e) {}
            }
        }

        async function onScanSuccess(decodedText) {
            document.getElementById('reader-wrapper').classList.add('flash-success');
            setTimeout(() => { processScannedQR(decodedText); }, 300);
        }

        // --- ESCANEO DESDE GALERÍA ---
        async function handleFileUpload(event) {
            if (event.target.files.length === 0) return;
            const file = event.target.files[0];
            
            document.getElementById('scanner-container').classList.add('oculto');
            document.getElementById('result-display').classList.remove('oculto');
            document.getElementById('result-display').className = "bg-zinc-900 p-8 rounded-3xl border-4 text-center shadow-2xl flex flex-col items-center justify-center border-zinc-500";
            document.getElementById('result-icon').innerText = "⏳";
            document.getElementById('result-title').innerText = "Analizando...";
            document.getElementById('result-title').className = "text-2xl font-black mb-2 uppercase tracking-widest text-zinc-400";
            document.getElementById('result-message').innerText = "Buscando código QR en la imagen...";
            document.getElementById('result-message').className = "text-lg text-zinc-300 font-bold mb-8";
            
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5Qrcode("reader");
            }

            try {
                const decodedText = await html5QrcodeScanner.scanFile(file, true);
                await processScannedQR(decodedText);
            } catch (err) {
                showResult("Error", "No se detectó ningún código QR en la imagen seleccionada.", "red");
            }
            
            event.target.value = ""; 
        }

        async function toggleStatus(event, index) {
            event.stopPropagation();
            const item = sessionHistory[index];
            if (item.status === 'pendiente') item.status = 'asistio';
            else if (item.status === 'asistio') item.status = 'no-asistio';
            else item.status = 'pendiente';

            renderHistory();
            localStorage.setItem('underproject_db', JSON.stringify(sessionHistory));
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ token: item.token, status: item.status }) }); } catch(e) { }
        }

        function renderHistory() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            let asis = 0, noAsis = 0;
            
            sessionHistory.forEach((item, index) => {
                if (item.status === 'asistio') asis++;
                if (item.status === 'no-asistio') noAsis++;

                if (item.name.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-900 border border-zinc-800 p-3 rounded-2xl flex justify-between items-center hover:border-indigo-500 cursor-pointer transition-all active:scale-95";
                    div.onclick = () => showTicket(item.name, item.data || `UP:${item.token}|${item.name}`, item.token);
                    let label = item.status === 'asistio' ? 'Asistió' : (item.status === 'no-asistio' ? 'Faltó' : 'Pendiente');
                    
                    div.innerHTML = `
                        <div class="flex-1">
                            <p class="font-bold text-sm text-zinc-200">${item.name}</p>
                            <p class="text-[9px] text-zinc-500 font-mono">${item.token}</p>
                        </div>
                        <button onclick="toggleStatus(event, ${index})" class="text-[8px] font-bold py-1 px-3 rounded-full transition-all uppercase ${'status-'+item.status}">${label}</button>
                    `;
                    list.appendChild(div);
                }
            });
            document.getElementById('count-asistio').innerText = asis;
            document.getElementById('count-no-asistio').innerText = noAsis;
            document.getElementById('count-total').innerText = sessionHistory.length;
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const hoy = new Date();
                const fecha = `${String(hoy.getDate()).padStart(2, '0')}-${String(hoy.getMonth() + 1).padStart(2, '0')}-${hoy.getFullYear()}`;
                const nombreLimpio = currentName.replace(/[^a-z0-9]/gi, '_');
                const a = document.createElement('a');
                a.href = canvas.toDataURL("image/png");
                a.download = `${nombreLimpio}_QR_${fecha}.png`;
                a.click();
            }
        }

        function resetApp() {
            document.getElementById('ticket-display').classList.add('oculto');
            document.getElementById('scanner-container').classList.add('oculto');
            document.getElementById('result-display').classList.add('oculto');
            document.getElementById('form-container').classList.remove('oculto');
            document.getElementById('history-container').classList.remove('oculto');
            fetchCloudData();
        }

        function clearFullHistory() {
            if (confirm("¿Limpiar la lista local? No borrará nada de tu Excel.")) {
                localStorage.clear(); sessionHistory = []; renderHistory();
            }
        }
    </script>
</body>
</html>
